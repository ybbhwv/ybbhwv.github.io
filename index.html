<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱情时光机 | 我们的专属回忆</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap');

        :root {
            --primary: #ff7eb9;
            --secondary: #7e7ef9;
            --accent: #ffb57e;
            --light: #faf7f5;
            --dark: #1f1f1f;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffeef5 100%);
            color: #333;
            min-height: 100vh;
        }

        .title-font {
            font-family: 'Playfair Display', serif;
        }

        .heartbeat {
            animation: heartbeat 1.5s ease-in-out infinite both;
        }

        @keyframes heartbeat {
            from { transform: scale(1); }
            5% { transform: scale(1.1); }
            10% { transform: scale(1); }
            15% { transform: scale(1.2); }
            20% { transform: scale(1); }
        }

        .gallery-item {
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .countdown-number {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="min-h-screen flex flex-col">
        <nav class="bg-white bg-opacity-80 py-4 px-6 shadow-sm sticky top-0 z-10 backdrop-blur-sm">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center">
                    <i class="fas fa-heart text-pink-500 text-2xl mr-2"></i>
                    <span class="title-font text-xl text-pink-500">{{ site.brand }}</span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="#home" class="text-gray-700 hover:text-pink-500 transition">首页</a>
                    <a href="#memories" class="text-gray-700 hover:text-pink-500 transition">精彩瞬间</a>
                    <a href="#countdown" class="text-gray-700 hover:text-pink-500 transition">纪念日</a>
                    <a href="#timeline" class="text-gray-700 hover:text-pink-500 transition">时间线</a>
                </div>
                <div class="flex items-center">
                    <a :href="site.adminPath" class="bg-pink-500 text-white px-4 py-2 rounded-full text-sm hover:bg-pink-600 transition">
                        {{ site.loginLabel }}
                    </a>
                </div>
            </div>
        </nav>

        <main class="flex-grow">
            <section v-if="contentState.loading" class="py-24 px-4">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8 text-center fade-in">
                    <i class="fas fa-heart text-pink-500 text-4xl mb-4"></i>
                    <h1 class="title-font text-3xl text-gray-800">正在加载回忆内容</h1>
                    <p class="text-gray-600 mt-3">页面内容来自 `content/` 目录，请稍候。</p>
                </div>
            </section>

            <section v-else-if="contentState.error" class="py-24 px-4">
                <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8 text-center fade-in">
                    <i class="fas fa-triangle-exclamation text-amber-500 text-4xl mb-4"></i>
                    <h1 class="title-font text-3xl text-gray-800">内容读取失败</h1>
                    <p class="text-gray-600 mt-3">{{ contentState.error }}</p>
                    <p class="text-gray-500 text-sm mt-4">请通过本地静态服务器访问页面，例如 `python -m http.server 8000`。</p>
                </div>
            </section>

            <template v-else>
                <section id="home" class="py-16 md:py-24 px-4">
                    <div class="max-w-4xl mx-auto text-center fade-in">
                        <h1 class="title-font text-4xl md:text-6xl text-gray-800 mb-6">
                            {{ site.heroTitlePrefix }}<span class="text-pink-500">{{ site.heroTitleHighlight }}</span>
                        </h1>
                        <p class="text-xl text-gray-600 mb-10">{{ site.heroDescription }}</p>

                        <div class="bg-white rounded-2xl p-8 shadow-lg max-w-2xl mx-auto">
                            <div class="flex justify-center items-center mb-6">
                                <div class="w-24 h-24 rounded-full bg-pink-100 border-4 border-white shadow-lg overflow-hidden">
                                    <img :src="site.profileLeftImage" :alt="site.profileLeftAlt" class="w-full h-full object-cover">
                                </div>
                                <div class="heartbeat mx-6">
                                    <i class="fas fa-heart text-pink-500 text-4xl"></i>
                                </div>
                                <div class="w-24 h-24 rounded-full bg-blue-100 border-4 border-white shadow-lg overflow-hidden">
                                    <img :src="site.profileRightImage" :alt="site.profileRightAlt" class="w-full h-full object-cover">
                                </div>
                            </div>

                            <div class="mb-8">
                                <h2 class="text-3xl title-font text-gray-800 mb-4">我们已经在一起</h2>
                                <div class="text-4xl md:text-5xl font-bold text-pink-500">
                                    {{ togetherTime.years }} 年 {{ togetherTime.months }} 月 {{ togetherTime.days }} 天
                                </div>
                                <div class="text-gray-500 mt-2">自 {{ formatDate(startDate, 'long') }}</div>
                            </div>

                            <div class="grid grid-cols-3 gap-4 text-center">
                                <div class="p-4 bg-pink-50 rounded-lg">
                                    <div class="text-3xl font-bold text-pink-500">{{ togetherTime.hours }}</div>
                                    <div class="text-gray-600">小时</div>
                                </div>
                                <div class="p-4 bg-pink-50 rounded-lg">
                                    <div class="text-3xl font-bold text-pink-500">{{ togetherTime.minutes }}</div>
                                    <div class="text-gray-600">分钟</div>
                                </div>
                                <div class="p-4 bg-pink-50 rounded-lg">
                                    <div class="text-3xl font-bold text-pink-500">{{ togetherTime.seconds }}</div>
                                    <div class="text-gray-600">秒</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="countdown" class="py-16 bg-white">
                    <div class="max-w-5xl mx-auto px-4">
                        <h2 class="title-font text-3xl text-center text-gray-800 mb-12">纪念日<span class="text-pink-500">倒计时</span></h2>

                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="bg-gradient-to-br from-pink-50 to-purple-50 p-6 rounded-2xl shadow-lg">
                                <h3 class="text-xl font-semibold text-gray-800 mb-4">下一个纪念日</h3>
                                <div class="text-2xl text-pink-500 font-semibold mb-6">
                                    {{ nextAnniversary ? nextAnniversary.name : '暂未配置纪念日' }}
                                </div>

                                <div class="grid grid-cols-4 gap-2 text-center">
                                    <div class="p-3 bg-white rounded-lg shadow">
                                        <div class="countdown-number text-3xl">{{ anniversaryCountdown.days }}</div>
                                        <div class="text-gray-600 text-sm">天</div>
                                    </div>
                                    <div class="p-3 bg-white rounded-lg shadow">
                                        <div class="countdown-number text-3xl">{{ anniversaryCountdown.hours }}</div>
                                        <div class="text-gray-600 text-sm">小时</div>
                                    </div>
                                    <div class="p-3 bg-white rounded-lg shadow">
                                        <div class="countdown-number text-3xl">{{ anniversaryCountdown.minutes }}</div>
                                        <div class="text-gray-600 text-sm">分</div>
                                    </div>
                                    <div class="p-3 bg-white rounded-lg shadow">
                                        <div class="countdown-number text-3xl">{{ anniversaryCountdown.seconds }}</div>
                                        <div class="text-gray-600 text-sm">秒</div>
                                    </div>
                                </div>

                                <div class="mt-6 text-gray-600">
                                    <i class="fas fa-calendar-alt text-pink-500 mr-2"></i>
                                    <span v-if="nextAnniversary">{{ formatDate(nextAnniversary.nextOccurrence, 'long') }}</span>
                                    <span v-else>请在 CMS 中添加纪念日</span>
                                </div>
                            </div>

                            <div class="bg-gradient-to-br from-blue-50 to-purple-50 p-6 rounded-2xl shadow-lg">
                                <div class="flex items-start justify-between gap-4 mb-4">
                                    <div>
                                        <h3 class="text-xl font-semibold text-gray-800">纪念日清单</h3>
                                        <p class="text-gray-500 text-sm mt-1">内容由 Sveltia CMS 管理</p>
                                    </div>
                                    <a :href="site.adminPath" class="text-sm text-pink-500 hover:text-pink-600 transition">前往编辑</a>
                                </div>

                                <div class="space-y-4">
                                    <div v-for="anniversary in sortedAnniversaries" :key="anniversary.name + anniversary.date" class="bg-white rounded-xl p-4 shadow-sm">
                                        <div class="flex items-center justify-between gap-3">
                                            <div>
                                                <div class="font-semibold text-gray-800">{{ anniversary.name }}</div>
                                                <div class="text-sm text-gray-500 mt-1">首次发生于 {{ formatDate(anniversary.date, 'long') }}</div>
                                            </div>
                                            <div class="text-right">
                                                <div class="text-sm text-pink-500 font-semibold">{{ formatDate(anniversary.nextOccurrence, 'short') }}</div>
                                                <div class="text-xs text-gray-500">下一次</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="memories" class="py-16 bg-gray-50">
                    <div class="max-w-6xl mx-auto px-4">
                        <h2 class="title-font text-3xl text-center text-gray-800 mb-4">精彩<span class="text-pink-500">瞬间</span></h2>
                        <p class="text-center text-gray-600 mb-12">记录我们一起走过的美好时光</p>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div v-for="memory in memories" :key="memory.title + memory.date" class="gallery-item bg-white rounded-xl overflow-hidden shadow-md">
                                <div class="h-48 overflow-hidden">
                                    <img :src="memory.image" :alt="memory.title" class="w-full h-full object-cover">
                                </div>
                                <div class="p-4">
                                    <h3 class="font-semibold text-lg text-gray-800">{{ memory.title }}</h3>
                                    <p class="text-gray-600 text-sm mt-2">{{ formatDate(memory.date, 'long') }}</p>
                                    <p class="text-gray-700 mt-3">{{ memory.description }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="timeline" class="py-16 bg-white">
                    <div class="max-w-4xl mx-auto px-4">
                        <h2 class="title-font text-3xl text-center text-gray-800 mb-4">我们的<span class="text-pink-500">时间线</span></h2>
                        <p class="text-center text-gray-600 mb-12">爱情路上的重要里程碑</p>

                        <div class="relative">
                            <div class="absolute left-1/2 transform -translate-x-1/2 h-full w-1 bg-pink-200 hidden md:block"></div>

                            <div v-for="(event, index) in timelineEvents" :key="event.title + event.date" :class="['relative mb-8 md:mb-12 flex', index % 2 === 0 ? 'justify-start' : 'justify-end']">
                                <div class="w-full md:w-5/12">
                                    <div :class="['p-6 rounded-2xl shadow-lg', index % 2 === 0 ? 'bg-pink-50' : 'bg-blue-50']">
                                        <h3 class="font-semibold text-lg text-gray-800">{{ event.title }}</h3>
                                        <p class="text-pink-500 text-sm mt-2">{{ formatDate(event.date, 'long') }}</p>
                                        <p class="text-gray-700 mt-3">{{ event.description }}</p>
                                    </div>
                                </div>
                                <div class="absolute top-6 w-6 h-6 rounded-full bg-pink-500 border-4 border-white shadow hidden md:block" :class="index % 2 === 0 ? 'right-0 transform translate-x-1/2' : 'left-0 transform -translate-x-1/2'"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </template>
        </main>

        <footer class="bg-gray-800 text-white py-12">
            <div class="max-w-6xl mx-auto px-4 text-center">
                <div class="flex justify-center space-x-6 mb-6">
                    <a href="#" class="text-gray-300 hover:text-pink-400 transition"><i class="fab fa-instagram text-2xl"></i></a>
                    <a href="#" class="text-gray-300 hover:text-pink-400 transition"><i class="fab fa-weixin text-2xl"></i></a>
                    <a href="#" class="text-gray-300 hover:text-pink-400 transition"><i class="fab fa-weibo text-2xl"></i></a>
                </div>
                <p class="text-gray-400">{{ site.footerCopy }}</p>
                <p class="text-gray-500 text-sm mt-2">{{ site.footerTagline }} <i class="fas fa-heart text-pink-500"></i></p>
            </div>
        </footer>
    </div>

    <script>
        const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount } = Vue;

        createApp({
            setup() {
                const site = reactive({
                    brand: "爱情时光机",
                    loginLabel: "登录",
                    adminPath: "admin/",
                    heroTitlePrefix: "我们的",
                    heroTitleHighlight: "爱情故事",
                    heroDescription: "记录每一个心动瞬间，珍藏每一份美好回忆",
                    profileLeftImage: "content/images/profile-left.svg",
                    profileLeftAlt: "左侧头像",
                    profileRightImage: "content/images/profile-right.svg",
                    profileRightAlt: "右侧头像",
                    footerCopy: "© 2026 爱情时光机",
                    footerTagline: "Made with love for you"
                });
                const startDate = ref("");
                const anniversaries = ref([]);
                const memories = ref([]);
                const timelineEvents = ref([]);
                const contentState = reactive({
                    loading: true,
                    error: ""
                });
                const togetherTime = reactive({
                    years: 0,
                    months: 0,
                    days: 0,
                    hours: 0,
                    minutes: 0,
                    seconds: 0
                });
                const anniversaryCountdown = reactive({
                    days: 0,
                    hours: 0,
                    minutes: 0,
                    seconds: 0
                });

                let timerId = null;

                const loadJson = async (path) => {
                    const response = await fetch(path, { cache: "no-store" });
                    if (!response.ok) {
                        throw new Error(`读取 ${path} 失败，HTTP ${response.status}`);
                    }

                    return response.json();
                };

                const parseDate = (value) => {
                    if (!value) {
                        return null;
                    }

                    const normalizedValue = value.includes("T") ? value : `${value}T00:00:00`;
                    const parsed = new Date(normalizedValue);
                    return Number.isNaN(parsed.getTime()) ? null : parsed;
                };

                const formatDate = (value, style = "long") => {
                    const parsed = value instanceof Date ? value : parseDate(value);
                    if (!parsed) {
                        return "未设置";
                    }

                    return new Intl.DateTimeFormat("zh-CN", {
                        year: "numeric",
                        month: style === "short" ? "2-digit" : "long",
                        day: "numeric"
                    }).format(parsed);
                };

                const buildNextOccurrence = (dateValue) => {
                    const parsed = parseDate(dateValue);
                    if (!parsed) {
                        return null;
                    }

                    const now = new Date();
                    const nextOccurrence = new Date(now.getFullYear(), parsed.getMonth(), parsed.getDate(), 0, 0, 0, 0);

                    if (nextOccurrence < now) {
                        nextOccurrence.setFullYear(nextOccurrence.getFullYear() + 1);
                    }

                    return nextOccurrence;
                };

                const sortedAnniversaries = computed(() => {
                    return [...anniversaries.value]
                        .map((item) => ({
                            ...item,
                            nextOccurrence: buildNextOccurrence(item.date)
                        }))
                        .filter((item) => item.nextOccurrence)
                        .sort((left, right) => left.nextOccurrence - right.nextOccurrence);
                });

                const nextAnniversary = computed(() => {
                    return sortedAnniversaries.value[0] || null;
                });

                const calculateTogetherTime = () => {
                    const start = parseDate(startDate.value);
                    if (!start) {
                        return;
                    }

                    const now = new Date();
                    let years = now.getFullYear() - start.getFullYear();
                    let months = now.getMonth() - start.getMonth();
                    let days = now.getDate() - start.getDate();

                    if (days < 0) {
                        months -= 1;
                        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                        days += lastMonth.getDate();
                    }

                    if (months < 0) {
                        years -= 1;
                        months += 12;
                    }

                    togetherTime.years = years;
                    togetherTime.months = months;
                    togetherTime.days = days;
                    togetherTime.hours = now.getHours();
                    togetherTime.minutes = now.getMinutes();
                    togetherTime.seconds = now.getSeconds();
                };

                const calculateAnniversaryCountdown = () => {
                    if (!nextAnniversary.value) {
                        anniversaryCountdown.days = 0;
                        anniversaryCountdown.hours = 0;
                        anniversaryCountdown.minutes = 0;
                        anniversaryCountdown.seconds = 0;
                        return;
                    }

                    const now = new Date();
                    const diff = nextAnniversary.value.nextOccurrence - now;
                    const safeDiff = Math.max(diff, 0);

                    anniversaryCountdown.days = Math.floor(safeDiff / (1000 * 60 * 60 * 24));
                    anniversaryCountdown.hours = Math.floor((safeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    anniversaryCountdown.minutes = Math.floor((safeDiff % (1000 * 60 * 60)) / (1000 * 60));
                    anniversaryCountdown.seconds = Math.floor((safeDiff % (1000 * 60)) / 1000);
                };

                const tick = () => {
                    calculateTogetherTime();
                    calculateAnniversaryCountdown();
                };

                const loadContent = async () => {
                    contentState.loading = true;
                    contentState.error = "";

                    try {
                        const [siteData, startData, anniversaryData, memoriesData, timelineData] = await Promise.all([
                            loadJson("content/site.json"),
                            loadJson("content/start.json"),
                            loadJson("content/anniversary.json"),
                            loadJson("content/memories.json"),
                            loadJson("content/timeline_events.json")
                        ]);

                        Object.assign(site, siteData);
                        startDate.value = startData.date;
                        anniversaries.value = Array.isArray(anniversaryData) ? anniversaryData : [];
                        memories.value = (Array.isArray(memoriesData) ? memoriesData : []).sort((left, right) => parseDate(right.date) - parseDate(left.date));
                        timelineEvents.value = (Array.isArray(timelineData) ? timelineData : []).sort((left, right) => parseDate(left.date) - parseDate(right.date));
                        tick();
                    } catch (error) {
                        contentState.error = error instanceof Error ? error.message : "未知错误";
                    } finally {
                        contentState.loading = false;
                    }
                };

                onMounted(async () => {
                    await loadContent();
                    timerId = window.setInterval(tick, 1000);
                });

                onBeforeUnmount(() => {
                    if (timerId) {
                        window.clearInterval(timerId);
                    }
                });

                return {
                    site,
                    startDate,
                    memories,
                    timelineEvents,
                    togetherTime,
                    anniversaryCountdown,
                    contentState,
                    sortedAnniversaries,
                    nextAnniversary,
                    formatDate
                };
            }
        }).mount("#app");
    </script>
</body>
</html>
